name: C++ CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Install compiler
        run: sudo apt-get update && sudo apt-get install -y g++

      - name: Build project
        run: g++ codekatat.cpp -o program

      - name : Run tests
        run: ./program
